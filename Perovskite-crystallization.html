<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Perovskite Solvation & Crystallization - Tsinghua University</title>
    <style>
        :root { --thu-purple: #660874; }
        body { margin: 0; background-color: #f4f6f8; color: #333; font-family: 'Segoe UI', Arial, sans-serif; overflow: hidden; touch-action: manipulation; }
        
        #header { position: absolute; top: 2%; left: 5%; right: 5%; z-index: 10; display: flex; justify-content: space-between; pointer-events: none; }
        .title-group { border-left: 4px solid var(--thu-purple); padding-left: 12px; }
        h1 { margin: 0; color: var(--thu-purple); font-size: clamp(14px, 4vw, 22px); letter-spacing: -0.5px; }
        .sub-title { font-size: clamp(9px, 2.5vw, 11px); color: #666; font-weight: 600; text-transform: uppercase; }
        .uni-name { font-weight: 800; font-size: clamp(12px, 4vw, 18px); color: var(--thu-purple); }

        #info-card { 
            position: absolute; top: 12%; left: 5%; width: clamp(240px, 30%, 320px); 
            background: rgba(255,255,255,0.85); padding: 15px; border-radius: 12px; 
            box-shadow: 0 8px 25px rgba(0,0,0,0.08); border: 1px solid rgba(102, 8, 116, 0.1);
            backdrop-filter: blur(10px); z-index: 5; font-size: 13px; line-height: 1.4;
        }

        #controls { position: absolute; bottom: 5%; left: 50%; transform: translateX(-50%); z-index: 20; width: 100%; text-align: center; }
        button { 
            padding: 14px 32px; font-size: 13px; cursor: pointer; background: var(--thu-purple); 
            border: none; color: white; border-radius: 50px; font-weight: 700;
            text-transform: uppercase; letter-spacing: 1px; transition: 0.3s;
            box-shadow: 0 8px 15px rgba(102, 8, 116, 0.3); -webkit-tap-highlight-color: transparent;
        }

        #legend { 
            position: absolute; top: 12%; right: 5%; background: rgba(255,255,255,0.85); 
            padding: 10px; border-radius: 8px; font-size: 10px; border: 1px solid #ddd; z-index: 5;
        }
        .item { display: flex; align-items: center; margin-bottom: 4px; }
        .dot { width: 8px; height: 8px; border-radius: 50%; margin-right: 6px; }

        @media (max-width: 600px) {
            #info-card { 
                top: auto; bottom: 14%; left: 50%; transform: translateX(-50%); 
                width: 85%; padding: 10px; font-size: 11px;
            }
            #legend { display: none; }
            h1 { font-size: 16px; }
        }
    </style>
</head>
<body>

    <div id="header">
        <div class="title-group">
            <h1>Crystallization Dynamics</h1>
            <div class="sub-title">1:1 Stoichiometric Assembly</div>
        </div>
        <div class="uni-name">TSINGHUA</div>
    </div>

    <div id="info-card">
        <b style="color:var(--thu-purple)">Scientific Model:</b><br>
        • <b>Stoichiometry:</b> ABX₃ ($A:B = 1:1$)<br>
        • <b>B-site (Pb²⁺):</b> Forms corner-sharing octahedra.<br>
        • <b>A-site (MA⁺/Cs⁺):</b> 27 cations fitting into 27 lattice voids.
    </div>

    <div id="controls">
        <button id="actionBtn" onclick="toggleCrystallization()">Initiate Crystallization</button>
    </div>

    <div id="legend">
        <div class="item"><span class="dot" style="background: #7f8c8d;"></span> Pb²⁺ (B)</div>
        <div class="item"><span class="dot" style="background: #f1c40f;"></span> I⁻ (X)</div>
        <div class="item"><span class="dot" style="background: #3498db;"></span> A⁺ (A)</div>
        <div class="item"><span class="dot" style="background: #a29bfe; opacity:0.6;"></span> Solvent</div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.9.1/gsap.min.js"></script>

    <script>
        let scene, camera, renderer, group;
        let leadAtoms = [], iodideAtoms = [], cationAtoms = [], solventMols = [];
        let isCrystallized = false;

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0xf4f6f8);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            document.body.appendChild(renderer.domElement);

            camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 1000);
            updateCameraPosition();

            group = new THREE.Group();
            scene.add(group);

            scene.add(new THREE.AmbientLight(0xffffff, 0.9));
            const light = new THREE.DirectionalLight(0xffffff, 0.4);
            light.position.set(10, 20, 10);
            scene.add(light);

            const leadGeom = new THREE.SphereBufferGeometry(0.35, 32, 32);
            const iodideGeom = new THREE.SphereBufferGeometry(0.2, 32, 32);
            const cationGeom = new THREE.SphereBufferGeometry(0.5, 32, 32);
            const solventGeom = new THREE.SphereBufferGeometry(0.12, 8, 8);

            const leadMat = new THREE.MeshPhongMaterial({ color: 0x7f8c8d });
            const iodideMat = new THREE.MeshPhongMaterial({ color: 0xf1c40f });
            const cationMat = new THREE.MeshPhongMaterial({ color: 0x3498db });
            const solventMat = new THREE.MeshPhongMaterial({ color: 0xa29bfe, transparent: true, opacity: 0.6 });

            const spacing = 2.6;

            // Generate matched 3x3x3 system (27 B-sites and 27 A-sites)
            for (let x = -1; x <= 1; x++) {
                for (let y = -1; y <= 1; y++) {
                    for (let z = -1; z <= 1; z++) {
                        // 1. Pb Atoms (B-site)
                        const lead = new THREE.Mesh(leadGeom, leadMat);
                        lead.position.set((Math.random()-0.5)*15, (Math.random()-0.5)*15, (Math.random()-0.5)*15);
                        lead.userData.target = new THREE.Vector3(x*spacing, y*spacing, z*spacing);
                        group.add(lead);
                        leadAtoms.push(lead);

                        // 2. I Atoms (X-site) - 6 per lead
                        const i_offs = [[1.3,0,0],[-1.3,0,0],[0,1.3,0],[0,-1.3,0],[0,0,1.3],[0,0,-1.3]];
                        i_offs.forEach(off => {
                            const i = new THREE.Mesh(iodideGeom, iodideMat);
                            i.position.copy(lead.position).add(new THREE.Vector3((Math.random()-0.5)*3, (Math.random()-0.5)*3, (Math.random()-0.5)*3));
                            i.userData.parent = lead;
                            i.userData.offset = new THREE.Vector3(off[0], off[1], off[2]);
                            group.add(i);
                            iodideAtoms.push(i);
                        });

                        // 3. A-site Cations (1:1 matching)
                        const c = new THREE.Mesh(cationGeom, cationMat);
                        c.position.set((Math.random()-0.5)*18, (Math.random()-0.5)*18, (Math.random()-0.5)*18);
                        // Target is the void center (offset by half spacing)
                        c.userData.target = new THREE.Vector3((x+0.5)*spacing, (y+0.5)*spacing, (z+0.5)*spacing);
                        c.material.transparent = true;
                        c.material.opacity = 0.2;
                        group.add(c);
                        cationAtoms.push(c);
                    }
                }
            }

            for (let i = 0; i < 120; i++) {
                const s = new THREE.Mesh(solventGeom, solventMat);
                s.position.set((Math.random()-0.5)*16, (Math.random()-0.5)*16, (Math.random()-0.5)*16);
                group.add(s);
                solventMols.push(s);
            }
        }

        function updateCameraPosition() {
            const isMobile = window.innerWidth < 600;
            camera.position.set(15, 12, 18);
            if (isMobile) group?.position.set(0, 2, 0);
            camera.lookAt(0, isMobile ? 2 : 0, 0);
        }

        function toggleCrystallization() {
            isCrystallized = !isCrystallized;
            const btn = document.getElementById('actionBtn');
            
            if (isCrystallized) {
                btn.innerText = "Re-dissolve";
                solventMols.forEach(s => {
                    gsap.to(s.position, { x: s.position.x*5, y: s.position.y*5, z: s.position.z*5, duration: 2 });
                    gsap.to(s.material, { opacity: 0, duration: 1 });
                });
                leadAtoms.forEach(l => {
                    gsap.to(l.position, { x: l.userData.target.x, y: l.userData.target.y, z: l.userData.target.z, duration: 2.5, ease: "power3.inOut" });
                });
                iodideAtoms.forEach(i => {
                    gsap.to(i.position, { 
                        x: i.userData.parent.userData.target.x + i.userData.offset.x, 
                        y: i.userData.parent.userData.target.y + i.userData.offset.y, 
                        z: i.userData.parent.userData.target.z + i.userData.offset.z, 
                        duration: 2.5, ease: "power3.inOut"
                    });
                });
                cationAtoms.forEach(c => {
                    gsap.to(c.position, { x: c.userData.target.x, y: c.userData.target.y, z: c.userData.target.z, duration: 2, delay: 0.5, ease: "back.out(1.5)" });
                    gsap.to(c.material, { opacity: 0.9, duration: 1 });
                });
            } else {
                location.reload();
            }
        }

        function animate() {
            requestAnimationFrame(animate);
            group.rotation.y += 0.0015;
            if (!isCrystallized) {
                const time = Date.now() * 0.0008;
                [...leadAtoms, ...cationAtoms].forEach((obj, idx) => {
                    obj.position.x += Math.sin(time + idx) * 0.005;
                    obj.position.y += Math.cos(time + idx) * 0.005;
                });
            }
            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            renderer.setSize(window.innerWidth, window.innerHeight);
            camera.aspect = window.innerWidth / window.innerHeight;
            updateCameraPosition();
            camera.updateProjectionMatrix();
        });

        init();
        animate();
    </script>
</body>
</html>
