<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tsinghua University | Perovskite 3D Builder</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <style>
        :root { --ts-purple: #612c82; --panel-bg: rgba(255, 255, 255, 0.98); }
        body { margin: 0; overflow: hidden; font-family: 'Segoe UI', system-ui, sans-serif; background: #000; color: white; height: 100vh; display: flex; flex-direction: column; }
        
        /* 头部：针对移动端大幅缩小 */
        #header {
            position: absolute; top: 0; width: 100%; text-align: center; 
            padding: 10px 0; pointer-events: none; z-index: 20;
            background: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent);
        }
        #header h1 { font-family: "Times New Roman", serif; font-size: 1.4rem; margin: 0; color: #fff; }
        #header p { margin: 2px 0; font-size: 0.6rem; letter-spacing: 1px; color: #ccc; }

        /* 3D 容器 */
        #canvas-container { flex: 1; width: 100%; position: relative; }

        /* 面板基础样式 */
        .panel {
            background: var(--panel-bg); color: #333;
            border-radius: 12px; box-shadow: 0 -4px 15px rgba(0,0,0,0.3);
            z-index: 10; padding: 15px;
        }

        /* 桌面端布局：悬浮两侧 */
        @media (min-width: 769px) {
            .panel { position: absolute; top: 80px; width: 220px; }
            #controls { left: 20px; }
            #info { right: 20px; }
        }

        /* 移动端布局：固定在底部，平铺不遮挡 */
        @media (max-width: 768px) {
            #header h1 { font-size: 1.1rem; }
            
            #ui-wrapper {
                display: flex;
                flex-direction: row;
                gap: 10px;
                padding: 10px;
                background: #1a1a1a; /* 底部工具栏背景 */
                height: 35vh; /* 占用底部 35% 的高度 */
                overflow-y: auto;
            }
            .panel {
                position: static !important;
                flex: 1;
                height: auto;
                padding: 10px;
                font-size: 0.75rem;
                border-radius: 8px;
            }
            h3 { font-size: 0.85rem !important; margin-bottom: 5px !important; }
            .btn { padding: 6px !important; margin: 5px 0 !important; font-size: 0.7rem !important; }
            .slider-group { margin: 5px 0 !important; }
        }

        h3 { margin: 0 0 10px 0; color: var(--ts-purple); border-bottom: 2px solid #eee; padding-bottom: 5px; }
        .slider-group { margin: 10px 0; }
        label { font-size: 0.75rem; font-weight: bold; color: #666; display: block; }
        input[type=range] { width: 100%; accent-color: var(--ts-purple); cursor: pointer; }
        
        .btn {
            display: block; width: 100%; padding: 8px; margin: 8px 0;
            background: var(--ts-purple); color: white; border: none;
            border-radius: 4px; cursor: pointer; font-weight: bold; transition: 0.2s;
        }
        .btn.active { background: #333; }

        .stat-item { display: flex; justify-content: space-between; margin: 3px 0; font-family: monospace; }
        hr { border: 0; border-top: 1px solid #ddd; margin: 8px 0; }
    </style>
</head>
<body>

    <div id="header">
        <h1>TSINGHUA UNIVERSITY</h1>
        <p>Perovskite 3D Network Analysis</p>
    </div>

    <div id="canvas-container"></div>

    <div id="ui-wrapper">
        <div id="controls" class="panel">
            <h3>Supercell</h3>
            <div class="slider-group">
                <label>Grid X: <span id="valX">2</span></label>
                <input type="range" id="sizeX" min="1" max="4" value="2">
            </div>
            <div class="slider-group">
                <label>Grid Y: <span id="valY">2</span></label>
                <input type="range" id="sizeY" min="1" max="4" value="2">
            </div>
            <div class="slider-group">
                <label>Grid Z: <span id="valZ">2</span></label>
                <input type="range" id="sizeZ" min="1" max="4" value="2">
            </div>
            <button class="btn" id="explodeBtn">Explode</button>
            <button class="btn" id="viewModeBtn">Mode: Poly</button>
        </div>

        <div id="info" class="panel">
            <h3>Statistics</h3>
            <div class="stat-item">A (MA⁺): <span id="countA" style="color:#d4af37">8</span></div>
            <div class="stat-item">B (Pb²⁺): <span id="countB" style="color:#7f8c8d">8</span></div>
            <div class="stat-item">X (I⁻): <span id="countX" style="color:#9b59b6">24</span></div>
            <hr>
            <p style="font-size:0.65rem; color:#888; margin:0;">Note: Surface atoms are not fully coordinated in finite cells.</p>
        </div>
    </div>

    <script>
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0a0a0a);
        
        const camera = new THREE.PerspectiveCamera(75, container.clientWidth / container.clientHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(container.clientWidth, container.clientHeight);
        container.appendChild(renderer.domElement);

        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        camera.position.set(10, 8, 12);
        controls.update();

        scene.add(new THREE.AmbientLight(0xffffff, 0.6));
        const light = new THREE.PointLight(0xffffff, 1);
        light.position.set(15, 15, 15);
        scene.add(light);

        const unitSize = 4;
        let supercellGroup = new THREE.Group();
        scene.add(supercellGroup);

        let gridX = 2, gridY = 2, gridZ = 2;
        let isExploded = false;
        let viewMode = 'polyhedra'; 

        const matA = new THREE.MeshPhongMaterial({ color: 0xd4af37 }); 
        const matB = new THREE.MeshPhongMaterial({ color: 0x7f8c8d }); 
        const matX = new THREE.MeshPhongMaterial({ color: 0x9b59b6, transparent: true, opacity: 0.8 }); 
        const matOcta = new THREE.MeshPhongMaterial({ color: 0x9b59b6, transparent: true, opacity: 0.25, side: THREE.DoubleSide });
        const matWire = new THREE.LineBasicMaterial({ color: 0x444444 });

        function createUnitCell(xOffset, yOffset, zOffset) {
            const cellGroup = new THREE.Group();
            cellGroup.userData = { xOffset, yOffset, zOffset };

            const boxGeom = new THREE.BoxGeometry(unitSize, unitSize, unitSize);
            const edges = new THREE.EdgesGeometry(boxGeom);
            cellGroup.add(new THREE.LineSegments(edges, matWire));

            const b = new THREE.Mesh(new THREE.SphereGeometry(0.35, 16, 16), matB);
            b.position.set(-unitSize/2, -unitSize/2, -unitSize/2);
            cellGroup.add(b);

            const a = new THREE.Mesh(new THREE.SphereGeometry(0.85, 16, 16), matA);
            a.position.set(0, 0, 0);
            cellGroup.add(a);

            [[-1,0,0], [0,-1,0], [0,0,-1]].forEach(p => {
                const x = new THREE.Mesh(new THREE.SphereGeometry(0.3, 16, 16), matX);
                x.position.set(p[0]*unitSize/2, p[1]*unitSize/2, p[2]*unitSize/2);
                cellGroup.add(x);
            });

            const octaMesh = new THREE.Mesh(new THREE.OctahedronGeometry(unitSize/2), matOcta);
            octaMesh.name = "octa";
            octaMesh.visible = (viewMode === 'polyhedra');
            cellGroup.add(octaMesh);

            cellGroup.position.set(xOffset * unitSize, yOffset * unitSize, zOffset * unitSize);
            return cellGroup;
        }

        function buildSupercell() {
            supercellGroup.clear();
            for (let x = 0; x < gridX; x++) {
                for (let y = 0; y < gridY; y++) {
                    for (let z = 0; z < gridZ; z++) {
                        supercellGroup.add(createUnitCell(x, y, z));
                    }
                }
            }
            const box = new THREE.Box3().setFromObject(supercellGroup);
            const center = box.getCenter(new THREE.Vector3());
            supercellGroup.position.sub(center);
            updateStats();
        }

        function updateStats() {
            document.getElementById('countA').innerText = gridX * gridY * gridZ;
            document.getElementById('countB').innerText = gridX * gridY * gridZ;
            document.getElementById('countX').innerText = (gridX * gridY * gridZ) * 3;
        }

        const syncGrid = (axis, val) => {
            if (axis === 'x') gridX = parseInt(val);
            if (axis === 'y') gridY = parseInt(val);
            if (axis === 'z') gridZ = parseInt(val);
            buildSupercell();
        }

        document.getElementById('sizeX').oninput = e => { syncGrid('x', e.target.value); document.getElementById('valX').innerText = e.target.value; }
        document.getElementById('sizeY').oninput = e => { syncGrid('y', e.target.value); document.getElementById('valY').innerText = e.target.value; }
        document.getElementById('sizeZ').oninput = e => { syncGrid('z', e.target.value); document.getElementById('valZ').innerText = e.target.value; }

        document.getElementById('explodeBtn').onclick = function() {
            isExploded = !isExploded;
            this.classList.toggle('active');
            supercellGroup.children.forEach(cell => {
                const ud = cell.userData;
                const factor = isExploded ? 1.6 : 1.0;
                cell.position.set(ud.xOffset * unitSize * factor, ud.yOffset * unitSize * factor, ud.zOffset * unitSize * factor);
            });
        };

        document.getElementById('viewModeBtn').onclick = function() {
            viewMode = (viewMode === 'polyhedra') ? 'ball' : 'polyhedra';
            this.innerText = `Mode: ${viewMode === 'polyhedra' ? 'Poly' : 'Ball'}`;
            supercellGroup.traverse(child => {
                if (child.name === "octa") child.visible = (viewMode === 'polyhedra');
            });
        };

        function animate() {
            requestAnimationFrame(animate);
            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            const w = container.clientWidth;
            const h = container.clientHeight;
            camera.aspect = w / h;
            camera.updateProjectionMatrix();
            renderer.setSize(w, h);
        });

        buildSupercell();
        animate();
    </script>
</body>
</html>
